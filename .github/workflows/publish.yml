name: Publish to GitHub Packages

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
      - run: npm install
      - run: npm run build
      - name: Rename for GitHub Packages
        run: |
          node -e "let pkg=require('./package.json'); pkg.name='@earnwithalee7890/ship-master-sdk'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2))"
      - run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
